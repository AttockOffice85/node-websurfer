<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedIn Bot</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        form {
            max-width: 600px;
            margin: auto;
        }

        label {
            display: block;
            margin-bottom: 8px;
        }

        input,
        textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 16px;
        }

        button {
            padding: 10px 15px;
            background-color: #0073b1;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #005580;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <form action="/start-bot" method="POST" id="botForm">
        <h1>Configure LinkedIn Bot</h1>
        <label for="username">LinkedIn Email</label>
        <input type="email" id="username" name="username" placeholder="yourLinkedIn@example.com" required>

        <label for="password">LinkedIn Password</label>
        <input type="password" id="password" name="password" required>

        <label for="randomPosts">Number of Posts to React to on Home Page</label>
        <input type="number" id="randomPosts" name="randomPosts" required>

        <label for="companies">List of Companies (comma-separated, in quotes)</label>
        <textarea id="companies" name="companies" rows="4" required>"The Redstone AI", "SyNet Digital"</textarea>

        <label for="companyPosts">Number of Posts to React to per Company</label>
        <input type="number" id="companyPosts" name="companyPosts" required>

        <button type="submit" id="submitBtn">Start Bot</button>
    </form>

    <script>
        document.getElementById('botForm').addEventListener('submit', function () {
            document.getElementById('submitBtn').disabled = true;
        });
    </script>
</body>

</html>
